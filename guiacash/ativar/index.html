<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativação Guia Cash | Vision Capacita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #25D366; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">GUIA <span class="text-green-600">CASH</span></h1>
            <p class="text-gray-500 text-sm mt-1">Configuração de Ecossistema Financeiro</p>
        </div>

        <div id="setup-content">
            <h2 id="boas-vindas" class="text-xl font-semibold text-gray-800 mb-4 text-center">Olá!</h2>
            <p class="text-gray-600 text-sm mb-6 text-center">
                Para liberarmos sua planilha personalizada e a automação, confirme seu <strong>e-mail do Google</strong> abaixo:
            </p>

            <div class="space-y-4">
                <input type="email" id="user-email" 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
                       placeholder="seu-email@gmail.com">
                
                <button onclick="ativarSistema()" id="btn-ativar"
                        class="w-full bg-black text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition transform active:scale-95 shadow-md">
                    GERAR MINHA ESTRUTURA
                </button>
            </div>
        </div>

        <div id="loading-state" class="hidden text-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="text-gray-700 font-medium">Configurando sua Inteligência...</p>
            <p class="text-gray-400 text-xs mt-2">Isso leva apenas alguns segundos.</p>
        </div>
    </div>

    <script>
        // 1. Captura dados da URL enviada pelo n8n
        const urlParams = new URLSearchParams(window.location.search);
        const nome = urlParams.get('nome') || 'Cliente';
        const idPedido = urlParams.get('id');
        const emailPadrao = urlParams.get('email');

        // 2. Personaliza a tela
        document.getElementById('boas-vindas').innerText = `Olá, ${nome}! 🚀`;
        if(emailPadrao) document.getElementById('user-email').value = emailPadrao;

        async function ativarSistema() {
            const emailGoogle = document.getElementById('user-email').value;
            const btn = document.getElementById('btn-ativar');
            
            if(!emailGoogle.includes('@')) {
                alert('Por favor, insira um e-mail válido.');
                return;
            }

            // UI: Troca para estado de carregamento
            document.getElementById('setup-content').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            try {
                // 3. Envia para o SEGUNDO Webhook do n8n (o de entrega)
                const response = await fetch('SUA_URL_WEBHOOK_N8N_ENTREGA', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_pagamento: idPedido,
                        nome: nome,
                        email_google: emailGoogle
                    })
                });

                const data = await response.json();

                if(data.link_planilha) {
                    // 4. Redireciona direto para a planilha criada
                    window.location.href = data.link_planilha;
                } else {
                    alert('Erro ao gerar planilha. Chame o suporte.');
                }
            } catch (error) {
                console.error(error);
                alert('Erro na comunicação com o servidor.');
            }
        }
    </script>
</body>
</html>
