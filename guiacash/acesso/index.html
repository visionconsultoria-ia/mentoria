<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GuiaCash® - Avaliação Gratuita</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary: #0FD6AA;
    --secondary: #63259D;
    --dark: #0f172a;
    --error: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family:'Inter',sans-serif;
    background: linear-gradient(135deg,#1a0b3b 0%,#0d3a44 100%);
    min-height:100vh;
    display:flex;
    align-items: flex-start;
    justify-content:center;
    color:white;
    padding: 15px;
}

.container {
    max-width:400px;
    width:100%;
    text-align:center;
    animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.badge {
    display:inline-block;
    margin-bottom:12px;
    background: var(--error);
    padding:5px 12px;
    border-radius:50px;
    font-size:0.7rem;
    font-weight:800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.logo {
    max-width:140px;
    margin:0 auto 15px;
    display:block;
}

h1 {
    font-size:1.7rem;
    font-weight:800;
    line-height:1.2;
    margin-bottom:10px;
}

.highlight { color:var(--primary); }

.description {
    font-size:0.95rem;
    opacity:0.9;
    margin-bottom:15px;
    line-height: 1.4;
}

.social-proof {
    font-size:0.75rem;
    opacity:0.8;
    margin-bottom:15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}
.social-proof i { color: #fbbf24; }

.card {
    background:white;
    border-radius:20px;
    padding:25px 20px;
    color:var(--dark);
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
    position: relative;
}

#error-banner {
    display: none;
    background: #fff1f2;
    color: #991b1b;
    border: 1px solid #fecdd3;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 15px;
    text-align: left;
    animation: shake 0.4s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}

.form-group { text-align: left; margin-bottom: 15px; }
label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 5px; color: #64748b; }

input {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid #e2e8f0;
    font-family:'Inter';
    outline:none;
    font-size: 1rem;
    transition: all 0.2s;
    appearance: none;
}

input:focus { border-color:var(--primary); }

input.invalid {
    border-color: var(--error) !important;
    background: #fff8f8;
}

.row { display:flex; gap:8px; }
.ddd { width:80px; text-align:center; }

.cta {
    width:100%;
    padding:18px;
    border-radius:50px;
    border:none;
    font-weight:800;
    background: linear-gradient(135deg,var(--secondary),var(--primary));
    color:white;
    cursor:pointer;
    font-size:1rem;
    box-shadow: 0 8px 15px rgba(99, 37, 157, 0.3);
    margin-top: 5px;
    /* ADIÇÃO DA PULSAÇÃO */
    animation: pulseGlow 2s infinite;
}

/* KEYFRAMES DA PULSAÇÃO */
@keyframes pulseGlow {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(15, 214, 170, 0.4); }
    70% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(15, 214, 170, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(15, 214, 170, 0); }
}

.cta:active { transform: scale(0.97); }

.cta-sub {
    font-size:0.7rem;
    color:#94a3b8;
    margin-top:12px;
    display: block;
}

.secure {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size:0.65rem;
    color:#cbd5e1;
    margin-top:15px;
    text-transform: uppercase;
}
</style>
</head>

<body>

<div class="container">
    <div class="badge">🔥 ACESSO LIBERADO HOJE</div>

    <img src="../guia-cash-logo.png" alt="GuiaCash Logo" class="logo">

    <h1>Dinheiro <span class="highlight">some todo mês?</span></h1>

    <p class="description">
        Descubra onde estão os gargalos da sua vida financeira e receba um plano prático agora.
    </p>

    <div class="social-proof">
        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
        <span>+1.327 avaliações hoje</span>
    </div>

    <div class="card">
        <div id="error-banner">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="error-text"></span>
        </div>

        <form id="leadForm" novalidate>
            <div class="form-group">
                <label>Seu melhor e-mail:</label>
                <input type="email" id="email" placeholder="email@exemplo.com">
            </div>

            <div class="form-group">
                <label>WhatsApp:</label>
                <div class="row">
                    <input type="tel" id="ddd" class="ddd" placeholder="DDD" maxlength="2" inputmode="numeric">
                    <input type="tel" id="whatsapp_num" placeholder="99999-9999" maxlength="10" inputmode="numeric">
                </div>
            </div>

            <button type="submit" id="btnEnviar" class="cta">
                ACESSAR AVALIAÇÃO <i class="fa-solid fa-arrow-right"></i>
            </button>

            <span class="cta-sub">
                <i class="fa-regular fa-clock"></i> Leva menos de 2 minutos
            </span>
        </form>
    </div>

    <div class="secure">
        <i class="fa-solid fa-lock"></i> Seus dados estão 100% protegidos
    </div>
</div>

<script>
const errorBanner = document.getElementById('error-banner');
const errorText = document.getElementById('error-text');

function showError(msg, targetId) {
    errorText.innerText = msg;
    errorBanner.style.display = 'block';
    
    if(targetId) {
        const el = document.getElementById(targetId);
        el.classList.add('invalid');
        el.focus();
    }
}

document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', () => {
        input.classList.remove('invalid');
        errorBanner.style.display = 'none';
    });
});

document.getElementById('ddd').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/\D/g, '');
    if(e.target.value.length === 2) document.getElementById('whatsapp_num').focus();
});

document.getElementById('whatsapp_num').addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length > 5) value = value.replace(/^(\d{5})(\d{4}).*/, '$1-$2');
    else value = value.replace(/^(\d{4})(\d{4}).*/, '$1-$2');
    e.target.value = value;
});

document.getElementById('leadForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email');
    const ddd = document.getElementById('ddd');
    const zap = document.getElementById('whatsapp_num');

    if (!email.value.trim() || !email.value.includes('@')) {
        showError("Insira um e-mail válido para continuar.", "email");
        return;
    }
    if (ddd.value.length < 2) {
        showError("Informe o DDD.", "ddd");
        return;
    }
    if (zap.value.replace(/\D/g, '').length < 8) {
        showError("Número de WhatsApp incompleto.", "whatsapp_num");
        return;
    }

    const btn = document.getElementById('btnEnviar');
    btn.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> AGUARDE...";
    btn.disabled = true;
    btn.style.animation = "none"; // Para a pulsação ao carregar

    const data = {
        email: email.value,
        whatsapp: "55" + ddd.value + zap.value.replace(/\D/g, ''),
        origem: 'WhatsApp_Mobile_V8'
    };

    fetch('https://n8nwebhook.visioncapacita.com.br/webhook/captura-guiacash', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).then(() => {
        setTimeout(() => { window.location.href = "https://visioncapacita.com.br/guiacash/avaliacao/"; }, 600);
    }).catch(() => {
        window.location.href = "https://visioncapacita.com.br/guiacash/avaliacao/";
    });
});
</script>

</body>
</html>
